<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ramadan Message</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b3a4b, #081c24);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: white;
      padding: 80px 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 800px;
      margin: auto;
      font-size: 1.2rem;
      line-height: 1.8;
    }

    .heart {
      position: fixed;
      top: -20px;
      color: #ff6b81;
      animation: fall 3s linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <p>(Your long Ramadan text will go here)</p>
  </div>

  <script>
    let count = 0;
    const interval = setInterval(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤";
      h.style.left = Math.random() * window.innerWidth + "px";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3000);
      count++;
      if (count > 40) clearInterval(interval);
    }, 80);
  </script>
</body>
</html>
